<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today, I'm Happy Because of You</title>
<style>
  :root{
    --pink-1:#ffe4ec;
    --pink-2:#ffc9dd;
    --pink-3:#ffaed1;
    --lavender:#e8d9ff;
    --cream:#fff8f3;
    --rose-text:#7a4a5b;
    --accent:#ff8fb1;
    --gold:#ffd6a5;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    min-height:100%;
    overflow-x:hidden;
    font-family:'Segoe UI', system-ui, sans-serif;
    background:
      radial-gradient(circle at 20% 20%, var(--pink-1), transparent 50%),
      radial-gradient(circle at 80% 30%, var(--lavender), transparent 55%),
      radial-gradient(circle at 50% 90%, var(--pink-2), transparent 60%),
      var(--cream);
    color:var(--rose-text);
  }

  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;500;600;700&display=swap');

  body{ font-family:'Quicksand', sans-serif; }

  .date-corner{
    position:fixed;
    top:14px;
    left:16px;
    font-size:0.78rem;
    letter-spacing:0.5px;
    color:var(--rose-text);
    background:rgba(255,255,255,0.55);
    backdrop-filter:blur(6px);
    padding:6px 12px;
    border-radius:20px;
    box-shadow:0 2px 10px rgba(255,143,177,0.25);
    z-index:50;
    opacity:0.9;
  }

  .scene{
    position:relative;
    width:100%;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:90px 20px 60px;
    overflow:hidden;
  }

  .float-layer{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:1;
  }

  .floatie{
    position:absolute;
    bottom:-10%;
    opacity:0;
    animation-name:floatUp;
    animation-timing-function:ease-in;
    animation-iteration-count:infinite;
    user-select:none;
  }

  @keyframes floatUp{
    0%{
      transform:translateY(0) translateX(0) rotate(0deg) scale(0.8);
      opacity:0;
    }
    10%{
      opacity:0.9;
    }
    50%{
      transform:translateY(-55vh) translateX(20px) rotate(15deg) scale(1);
    }
    90%{
      opacity:0.7;
    }
    100%{
      transform:translateY(-110vh) translateX(-10px) rotate(-10deg) scale(0.9);
      opacity:0;
    }
  }

  .sparkle{
    position:absolute;
    width:6px;
    height:6px;
    background:var(--gold);
    border-radius:50%;
    box-shadow:0 0 8px 2px var(--gold);
    animation:twinkle 2.4s ease-in-out infinite;
  }

  @keyframes twinkle{
    0%,100%{ opacity:0.15; transform:scale(0.6); }
    50%{ opacity:1; transform:scale(1.3); }
  }

  .content{
    position:relative;
    z-index:5;
    max-width:620px;
    width:100%;
    text-align:center;
  }

  .title{
    font-family:'Dancing Script', cursive;
    font-size:2.6rem;
    color:var(--accent);
    margin:0 0 6px;
    text-shadow:0 2px 12px rgba(255,143,177,0.35);
    animation:gentlePulse 3.5s ease-in-out infinite;
  }

  @keyframes gentlePulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.03); }
  }

  .subtitle{
    font-size:0.95rem;
    color:#a87a8c;
    margin-bottom:34px;
    letter-spacing:0.5px;
  }

  .card{
    background:rgba(255,255,255,0.55);
    backdrop-filter:blur(10px);
    border-radius:28px;
    padding:36px 28px;
    box-shadow:0 8px 32px rgba(255,143,177,0.25), inset 0 0 0 1px rgba(255,255,255,0.6);
    margin-bottom:36px;
  }

  #typewriter{
    font-size:1.08rem;
    line-height:1.9;
    white-space:pre-wrap;
    text-align:left;
    min-height:60px;
  }

  #typewriter .line{
    display:block;
  }

  #typewriter .blank{
    display:block;
    height:0.5em;
  }

  .cursor{
    display:inline-block;
    width:2px;
    background:var(--accent);
    margin-left:2px;
    animation:blink 0.8s step-end infinite;
  }

  @keyframes blink{
    50%{ opacity:0; }
  }

  .reveal-section{
    opacity:0;
    transform:translateY(14px);
    transition:opacity 0.8s ease, transform 0.8s ease;
    pointer-events:none;
  }

  .reveal-section.visible{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
  }

  .ask-btn{
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:1.05rem;
    color:#fff;
    background:linear-gradient(135deg, var(--accent), var(--pink-3));
    border:none;
    padding:16px 30px;
    border-radius:50px;
    cursor:pointer;
    box-shadow:0 6px 20px rgba(255,143,177,0.5);
    transition:transform 0.25s ease, box-shadow 0.25s ease;
    animation:breathe 2.6s ease-in-out infinite;
  }

  .ask-btn:hover{
    transform:translateY(-3px) scale(1.04);
    box-shadow:0 10px 26px rgba(255,143,177,0.6);
  }

  .ask-btn:active{
    transform:scale(0.97);
  }

  @keyframes breathe{
    0%,100%{ box-shadow:0 6px 20px rgba(255,143,177,0.5); }
    50%{ box-shadow:0 6px 30px rgba(255,143,177,0.8); }
  }

  .answer-box{
    margin-top:26px;
    font-family:'Dancing Script', cursive;
    font-size:2.1rem;
    color:#e85c8a;
    opacity:0;
    transform:scale(0.7);
    transition:opacity 0.6s ease, transform 0.6s cubic-bezier(.34,1.56,.64,1);
  }

  .answer-box.show{
    opacity:1;
    transform:scale(1);
  }

  .heart-burst{
    position:relative;
    height:0;
  }

  .burst-heart{
    position:absolute;
    font-size:1.4rem;
    opacity:0;
    pointer-events:none;
  }

  .final-message{
    margin-top:50px;
    opacity:0;
    transform:translateY(12px);
    transition:opacity 1s ease 0.3s, transform 1s ease 0.3s;
  }

  .final-message.show{
    opacity:1;
    transform:translateY(0);
  }

  .big-heart{
    font-size:2.4rem;
    display:block;
    animation:heartbeat 1.4s ease-in-out infinite;
  }

  @keyframes heartbeat{
    0%,100%{ transform:scale(1); }
    25%{ transform:scale(1.15); }
    40%{ transform:scale(1); }
    60%{ transform:scale(1.1); }
  }

  @media (max-width:480px){
    .title{ font-size:2.1rem; }
    .card{ padding:26px 18px; }
    #typewriter{ font-size:1rem; }
    .answer-box{ font-size:1.7rem; }
  }

  @media (prefers-reduced-motion: reduce){
    *{
      animation:none !important;
      transition:none !important;
    }
  }
</style>
</head>
<body>

<div class="date-corner" id="dateCorner"></div>

<div class="float-layer" id="floatLayer"></div>

<div class="scene">
  <div class="content">
    <h1 class="title">Today, I'm Happy Because of You</h1>
    <p class="subtitle">a little note, just for you 🌷</p>

    <div class="card">
      <div id="typewriter"></div>
    </div>

    <div class="reveal-section" id="buttonSection">
      <button class="ask-btn" id="askBtn">What made me happy today? 💭</button>
      <div class="answer-box" id="answerBox">You did. 🫶🏻🌷</div>
      <div class="heart-burst" id="heartBurst"></div>
    </div>

    <div class="final-message" id="finalMessage">
      <span class="big-heart">❤️</span>
    </div>
  </div>
</div>

<script>
  // ---- Date in corner ----
  const dateCorner = document.getElementById('dateCorner');
  const today = new Date();
  const options = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  dateCorner.textContent = today.toLocaleDateString('en-US', options);

  // ---- Floating hearts, flowers, sparkles ----
  const floatLayer = document.getElementById('floatLayer');
  const emojis = ['💗','🌸','✨','💕','🌷','💖','🌺','✨','💞','🌼'];

  function createFloatie(){
    const el = document.createElement('div');
    el.className = 'floatie';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const size = 14 + Math.random()*20;
    el.style.fontSize = size + 'px';
    el.style.left = Math.random()*100 + 'vw';
    const duration = 8 + Math.random()*7;
    el.style.animationDuration = duration + 's';
    el.style.animationDelay = (Math.random()*4) + 's';
    floatLayer.appendChild(el);
    setTimeout(()=> el.remove(), (duration+4)*1000);
  }

  for(let i=0;i<14;i++){
    setTimeout(createFloatie, i*400);
  }
  setInterval(createFloatie, 900);

  function createSparkle(){
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = Math.random()*100 + 'vw';
    s.style.top = Math.random()*100 + 'vh';
    s.style.animationDelay = (Math.random()*2) + 's';
    floatLayer.appendChild(s);
    setTimeout(()=> s.remove(), 4000);
  }
  setInterval(createSparkle, 600);

  // ---- Typewriter effect ----
  const paragraphs = [
    "Today, I'm genuinely happy.",
    "",
    "Aur pata hai sabse funny baat kya hai?",
    "",
    "Aaj koi bada miracle nahi hua.",
    "Maine lottery nahi jeeti.",
    "Life mein bhi koi huge change nahi aaya.",
    "",
    "Phir bhi main bahut khush hoon.",
    "",
    "Because of you.",
    "",
    "Maybe aapko laga hoga ki yeh bas ek chhoti si baat thi.",
    "Maybe aapko laga hoga ki ismein kuch special nahi tha.",
    "",
    "But genuinely kahun...",
    "",
    "Mujhe bahut achha lagta hai jab aap kisi cheez mein effort daalte ho. Chahe woh mere liye ho ya khud ke liye. Lekin jab uss cheez mein main bhi kahin na kahin involved hota hoon, it feels even more special.",
    "",
    "Aapko pata hai, main kaafi dino se exhausted feel kar raha tha.",
    "",
    "Thoda sad.",
    "Thoda disappointed.",
    "Aur shayad thoda dara hua bhi.",
    "",
    "Kyuki mujhe lagne laga tha ki main aapko lose kar raha hoon.",
    "",
    "Main khud ko samjhane ki bahut koshish karta tha, lekin har baar fail ho jaata tha.",
    "",
    "Jab aapki appi aayi thi aur aap do din tak offline thi, usse pehle aapne kaha tha ki main aapko time nahi de paa raha hoon.",
    "",
    "Uske baad jab aap sirf thodi der ke liye online aati thi, aur mere messages ke baad bhi reels dekh kar offline chali jaati thi, tab pata nahi kyun mujhe lagne laga tha ki shayad aapka interest mujhse kam ho gaya hai.",
    "",
    "Aur sach kahun, yeh soch soch kar mujhe ghutan si hone lagi thi.",
    "",
    "I missed you.",
    "",
    
    ,
    "Kabhi kabhi aisa lagta tha jaise sab log dheere dheere door ja rahe hain.",
    "Ya ek din chale jaayenge.",
    "",
    "Phir anxiety bhi hone lagi.",
    "",
    "Kabhi kabhi dil bahut zor se dhadakta tha.",
    "Kabhi saans lena mushkil lagta tha.",
    "",
    "I hope someday you understand how much all of this affected me.",
    "",
    "Aur phir kabhi kabhi jab main Anmol aur uski girlfriend ko dekhta hoon, mujhe jealousy hoti hai.",
    "",
    "Unse nahi.",
    "",
    "Bas unke paas jo hai usse.",
    "",
    "Kabhi kabhi sochta hoon, kaash aap bhi mujhe apne din ki chhoti chhoti baatein batati.",
    "Kaash aap mujhe random gossip sunati.",
    "Kaash aap mujhe tease karti.",
    "Kaash aap mujh par thoda sa haq jatati.",
    "",
    "Jaise main aapke baare mein sochta hoon,",
    "waise hi kabhi kabhi aap bhi mere baare mein sochti.",
    "",
    "Aur phir main bhi duniya ko aapki funny aur cute baatein bata pata.",
    "",
    "Sach kahun, mujhe unse zyada jalan is baat se hoti hai ki main hamesha yahi sochta rehta hoon ki meri kami kahan reh gayi.",
    "",
    "Main jitna karta hoon, kabhi kabhi lagta hai enough nahi hai.",
    "",
  
    "Log aksar badi badi cheezein yaad rakhte hain.",
    "",
    "Mere paas shayad aisi bahut badi memories nahi hain.",
    "",
    "Isliye main un chhoti chhoti cheezon ko sambhal kar rakhta hoon jo dil se ki jaati hain.",
    "",
    "Aur aaj...",
    "",
    "Aapne mujhe apni life mein involve kiya.",
    "",
    "Shayad aapko yeh normal laga ho.",
    "",
    "Lekin mere liye yeh special tha.",
    "",
    "Kyuki yeh woh feeling hai jo mujhe bahut kam milti hai.",
    "",
    "You probably don't even realize it,",
    "but you've been the reason behind so many of my smiles today.",
    "",
    "Aur sirf aaj hi nahi.",
    "",
    "Isse pehle bhi bahut baar.",
    "",
    "It's funny how the smallest things from the right person can mean more than the biggest gestures in the world.",
    "",
    "Aur aaj...",
    "",
    "Aapne mera poora din better bana diya.",
    "",
    "Thank you for trying.",
    "",
    "Thank you for caring.",
    "",
    "And thank you for being my pyaraaa bachaaaa. 🌷🫶🏻"
  ];

  const typewriterEl = document.getElementById('typewriter');
  const buttonSection = document.getElementById('buttonSection');

  let pIndex = 0;
  let cIndex = 0;
  let currentLine = null;
  const speed = 22;

  function typeNext(){
    if(pIndex >= paragraphs.length){
      const cur = typewriterEl.querySelector('.cursor');
      if(cur) cur.remove();
      buttonSection.classList.add('visible');
      return;
    }

    const text = paragraphs[pIndex];

    if(cIndex === 0){
      currentLine = document.createElement('span');
      currentLine.className = text === "" ? "blank" : "line";
      typewriterEl.appendChild(currentLine);
      if(text === ""){
        pIndex++;
        cIndex = 0;
        setTimeout(typeNext, speed*3);
        return;
      }
    }

    const oldCursor = typewriterEl.querySelector('.cursor');
    if(oldCursor) oldCursor.remove();

    currentLine.textContent = text.slice(0, cIndex+1);
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    cursor.innerHTML = '&nbsp;';
    currentLine.appendChild(cursor);

    cIndex++;

    if(cIndex >= text.length){
      pIndex++;
      cIndex = 0;
      setTimeout(typeNext, speed*4);
    } else {
      setTimeout(typeNext, speed);
    }
  }

  setTimeout(typeNext, 600);

  // ---- Interactive button ----
  const askBtn = document.getElementById('askBtn');
  const answerBox = document.getElementById('answerBox');
  const finalMessage = document.getElementById('finalMessage');
  const heartBurst = document.getElementById('heartBurst');

  askBtn.addEventListener('click', () => {
    answerBox.classList.add('show');
    askBtn.style.opacity = '0.6';
    askBtn.style.pointerEvents = 'none';

    const burstEmojis = ['💗','💕','💖','✨','🌷'];
    for(let i=0;i<14;i++){
      const h = document.createElement('span');
      h.className = 'burst-heart';
      h.textContent = burstEmojis[Math.floor(Math.random()*burstEmojis.length)];
      const angle = (Math.random()*360) * Math.PI/180;
      const dist = 60 + Math.random()*80;
      h.style.left = '50%';
      h.style.top = '0px';
      h.style.transition = 'all 1.1s cubic-bezier(.2,.8,.3,1)';
      heartBurst.appendChild(h);

      requestAnimationFrame(()=>{
        h.style.opacity = '1';
        h.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist - 40}px) scale(1.3)`;
      });

      setTimeout(()=>{
        h.style.opacity = '0';
      }, 800);
      setTimeout(()=> h.remove(), 1200);
    }

    setTimeout(()=>{
      finalMessage.classList.add('show');
    }, 900);
  });
</script>

</body>
</html>
